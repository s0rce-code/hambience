name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Update module.json
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          VERSION_NUM=${VERSION#v}
          sed -i "s|\"version\": \"[^\"]*\"|\"version\": \"${VERSION_NUM}\"|g" module.json
          sed -i "s|\"download\": \"[^\"]*\"|\"download\": \"${{ vars.REPO_URL }}/releases/download/${VERSION}/module.zip\"|g" module.json
          sed -i "s|\"manifest\": \"[^\"]*\"|\"manifest\": \"${{ vars.REPO_URL }}/releases/latest/module.json\"|g" module.json

      - name: Package module.zip
        run: zip -r module.zip . -x "*.git*" -x ".gitea/*" -x "*.DS_Store"

      - name: Create release and upload assets
        env:
          GITEA_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.VERSION }}
          INTERNAL: ${{ vars.INTERNAL_URL }}
          REPO: ${{ vars.REPO_URL }}
        run: |
          MANIFEST_URL="${REPO}/releases/download/${VERSION}/module.json"

          RELEASE=$(curl -s -X POST \
            -H "Authorization: token ${GITEA_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"tag_name\":\"${VERSION}\",\"name\":\"HAmbience ${VERSION}\",\"body\":\"## Foundry VTT Manifest URL\n\nPaste into Foundry: Add-on Modules > Install Module > Manifest URL:\n\n\`${MANIFEST_URL}\`\n\n---\n\nIf HAmbience adds something to your table, a coffee helps me keep building: https://buymeacoffee.com/s0rcecode\",\"draft\":false,\"prerelease\":false}" \
            "${INTERNAL}/api/v1/repos/rufio/HAmbience/releases")

          RELEASE_ID=$(echo $RELEASE | grep -o '"id":[0-9]*' | head -1 | grep -o '[0-9]*')
          echo "Release ID: ${RELEASE_ID}"

          curl -s -X POST \
            -H "Authorization: token ${GITEA_TOKEN}" \
            -F "attachment=@module.json" \
            "${INTERNAL}/api/v1/repos/rufio/HAmbience/releases/${RELEASE_ID}/assets"

          curl -s -X POST \
            -H "Authorization: token ${GITEA_TOKEN}" \
            -F "attachment=@module.zip" \
            "${INTERNAL}/api/v1/repos/rufio/HAmbience/releases/${RELEASE_ID}/assets"
