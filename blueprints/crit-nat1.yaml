blueprint:
  name: "HAmbience - Critical Miss (Nat 1)"
  description: >
    An ominous red flash when a natural 1 is rolled.
    Generated by HAmbience. The light flash is self-restoring, so your lights
    return to their previous state on their own. An optional sound can play on a
    media player. Link the automation this creates to the matching critical-roll
    preset trigger in HAmbience.
  domain: automation
  author: HAmbience
  input:
    crit_lights:
      name: Lights
      description: The lights to flash on this critical roll.
      selector:
        target:
          entity:
            - domain: light
    crit_color:
      name: Flash Color (RGB)
      default: [200, 30, 30]
      selector:
        color_rgb: {}
    crit_sound:
      name: Sound (optional)
      description: Pick a sound file to play on a critical roll. Leave empty for no sound.
      default: ""
      selector:
        media: {}

mode: restart

trigger:
  - platform: event
    event_type: hambience_crit_nat1

condition: []

variables:
  sound_entity_id: "{{ crit_sound.entity_id if crit_sound is mapping else '' }}"
  sound_content_id: "{{ crit_sound.media_content_id if crit_sound is mapping else '' }}"
  sound_content_type: "{{ crit_sound.media_content_type if crit_sound is mapping else 'music' }}"

action:
  # Snapshot current light state so we can restore it after the flash.
  - variables:
      light_states: >-
        {% set ns = namespace(states=[]) %}
        {% for entity_id in (expand(crit_lights) | map(attribute='entity_id') | list) %}
          {% set s = states[entity_id] %}
          {% set ns.states = ns.states + [{'entity_id': entity_id, 'state': s.state, 'attributes': s.attributes}] %}
        {% endfor %}
        {{ ns.states }}
  # Flash: turn on with crit color.
  - service: light.turn_on
    target: !input crit_lights
    data:
      rgb_color: !input crit_color
      brightness: 255
      transition: 0.5
  # Optional sound.
  - choose:
      - conditions:
          - condition: template
            value_template: "{{ sound_entity_id != '' and sound_content_id != '' }}"
        sequence:
          - service: media_player.play_media
            target:
              entity_id: "{{ sound_entity_id }}"
            data:
              media:
                media_content_id: "{{ sound_content_id }}"
                media_content_type: "{{ sound_content_type }}"
                metadata: {}
    default: []
  # Hold the crit color for 2 seconds.
  - delay:
      seconds: 2
  # Restore each light to its prior state.
  - repeat:
      for_each: "{{ light_states }}"
      sequence:
        - choose:
            - conditions:
                - condition: template
                  value_template: "{{ repeat.item.state == 'on' }}"
              sequence:
                - service: light.turn_on
                  target:
                    entity_id: "{{ repeat.item.entity_id }}"
                  data:
                    brightness: "{{ repeat.item.attributes.brightness | default(255) }}"
                    color_temp: "{{ repeat.item.attributes.color_temp | default(omit) }}"
                    rgb_color: "{{ repeat.item.attributes.rgb_color | default(omit) }}"
                    transition: 1
            - conditions:
                - condition: template
                  value_template: "{{ repeat.item.state == 'off' }}"
              sequence:
                - service: light.turn_off
                  target:
                    entity_id: "{{ repeat.item.entity_id }}"
                  data:
                    transition: 1
