blueprint:
  name: "HAmbience - Critical Miss (Nat 1)"
  description: >
    An ominous red flash when a natural 1 is rolled.
    Generated by HAmbience. The light flash is self-restoring, so your lights
    return to their previous state on their own. An optional sound can play on a
    media player. Link the automation this creates to the matching critical-roll
    preset trigger in HAmbience.
  domain: automation
  author: HAmbience
  input:
    crit_lights:
      name: Lights
      description: The lights to flash on this critical roll.
      selector:
        target:
          entity:
            - domain: light
    crit_color:
      name: Flash Color (RGB)
      default: [200, 30, 30]
      selector:
        color_rgb: {}
    crit_media_player:
      name: Sound Player (optional)
      description: A media player to play a sound on. Leave empty for no sound.
      default: ""
      selector:
        entity:
          filter:
            - domain: media_player
    crit_sound:
      name: Sound (media content id, optional)
      description: A media_content_id (URL or media-source path). Leave empty for no sound.
      default: ""
      selector:
        text: {}

mode: restart

trigger:
  - platform: event
    event_type: hambience_crit_nat1

condition: []

variables:
  media_player_entity: !input crit_media_player
  sound_id: !input crit_sound

action:
  # Slow, self-restoring flash so lights return to their prior state on their own.
  - service: light.turn_on
    target: !input crit_lights
    data:
      rgb_color: !input crit_color
      flash: long
  # Optional sound, only if both a player and a sound were provided.
  - choose:
      - conditions:
          - condition: template
            value_template: "{{ media_player_entity not in [none, ''] and sound_id not in [none, ''] }}"
        sequence:
          - service: media_player.play_media
            target:
              entity_id: "{{ media_player_entity }}"
            data:
              media_content_id: "{{ sound_id }}"
              media_content_type: music
    default: []
